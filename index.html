<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Správa badmintonových turnajů – losování, výsledky, statistiky">
    <meta name="theme-color" content="#3b82f6">
    <title>Losovací web</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏸</text></svg>">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <!-- Skip to main content (accessibility) -->
    <a href="#app-content" class="skip-link">Přeskočit na obsah</a>

    <div class="container">
        <header class="header" role="banner">
            <div class="header-left">
                <h1>🏸 <span id="tournament-title">Losovací web</span></h1>
                <p id="tournament-subtitle" aria-live="polite">Správa turnajů</p>
            </div>
            <nav class="header-right" aria-label="Nástroje">
                <button class="icon-btn" onclick="undoAction()" title="Zpět (Ctrl+Z)" id="undo-btn" aria-label="Vrátit zpět">↶</button>
                <button class="icon-btn" onclick="redoAction()" title="Vpřed (Ctrl+Y)" id="redo-btn" aria-label="Zopakovat">↷</button>
                <button class="icon-btn" onclick="showTemplatesModal()" title="Šablony turnajů" aria-label="Šablony turnajů">📋</button>
                <button class="icon-btn" onclick="i18n.showLanguageSelector()" title="Jazyk / Language" aria-label="Přepnout jazyk">🌍</button>
                <button class="icon-btn" onclick="State.showBackupMenu()" title="Záloha dat" aria-label="Záloha dat">☁️</button>
                <button class="icon-btn" onclick="openSpectatorMode()" title="Diváckový mód – sdílet live výsledky" aria-label="Diváckový mód">👁️</button>
                <button class="icon-btn" onclick="Stats.showHistoricalStats()" title="Statistiky napříč turnaji" aria-label="Statistiky">📊</button>
                <button class="icon-btn" onclick="openThemeMenu()" title="Motiv" aria-label="Změnit motiv">🎨</button>
                <button class="icon-btn" onclick="toggleDarkMode()" title="Tmavý režim" aria-label="Přepnout tmavý režim">🌙</button>
                <button class="icon-btn" onclick="openHistory()" title="Historie" aria-label="Historie turnajů">📚</button>
                <button class="icon-btn" onclick="window.print()" title="Tisk" aria-label="Tisk">🖨️</button>
                <button class="icon-btn" onclick="openExportMenu()" title="Export" aria-label="Export dat">📤</button>
            </nav>
        </header>

        <nav class="steps" id="steps-container" aria-label="Kroky turnaje"></nav>
        <main id="app-content" role="main" aria-live="polite"></main>
    </div>

    <!-- Modals -->
    <div id="participant-modal" class="modal" role="dialog" aria-modal="true"></div>
    <div id="theme-modal" class="modal" role="dialog" aria-modal="true"></div>
    <div id="history-modal" class="modal" role="dialog" aria-modal="true"></div>
    <div id="export-modal" class="modal" role="dialog" aria-modal="true"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="./js/firebase.js"></script>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/matches.js"></script>
    <script src="./js/swiss.js"></script>
    <script src="./js/playoff.js"></script>
    <script src="./js/stats.js"></script>
    <script src="./js/export.js"></script>
    <script src="./js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        // Check for updates
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                    if (typeof Utils !== 'undefined') {
                                        Utils.showNotification('🔄 Dostupná nová verze. Obnovte stránku.', 'info');
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
